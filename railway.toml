[build]
builder = "nixpacks"
buildCommand = "npm ci --prefix client && npm run build --prefix client && npm ci --prefix server"

[nixpacks]
nodeVersion = "20"

[deploy]
startCommand = "node server/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
