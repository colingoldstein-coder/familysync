services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: familysync
      POSTGRES_USER: familysync
      POSTGRES_PASSWORD: familysync_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://familysync:familysync_dev_password@db:5432/familysync
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3001}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      - db

volumes:
  pgdata:
